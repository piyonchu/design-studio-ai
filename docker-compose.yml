services:
  db:
    image: pgvector/pgvector:pg16
    container_name: design-studio-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-designstudio}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-designstudio}
      POSTGRES_DB: ${POSTGRES_DB:-design_studio}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./infra/db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-designstudio} -d ${POSTGRES_DB:-design_studio}"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  db_data:
